<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول | مستر ديليفري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0A0A0C;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.login-card{

width:390px;
max-width:95%;

background:#111115;

border:1px solid rgba(255,255,255,.06);

border-radius:18px;

padding:35px;

box-shadow:0 15px 40px rgba(0,0,0,.45);

}

.logo{

width:70px;
height:70px;
margin:auto;
margin-bottom:20px;

border-radius:18px;

background:#FF4B12;

display:flex;
justify-content:center;
align-items:center;

font-size:34px;

}

h2{

text-align:center;
color:white;

margin-bottom:6px;

}

p{

text-align:center;

color:#888;

margin-bottom:30px;

font-size:14px;

}

.form-group{

margin-bottom:18px;

}

label{

display:block;

color:#ddd;

font-size:14px;

margin-bottom:8px;

}

input{

width:100%;

height:48px;

border:none;

outline:none;

background:#1A1A20;

border:1px solid rgba(255,255,255,.08);

border-radius:10px;

padding:0 15px;

color:white;

font-size:15px;

transition:.25s;

}

input:focus{

border-color:#FF4B12;

}

.password-box{

position:relative;

}

.password-box span{

position:absolute;

left:15px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

font-size:18px;

}

button{

width:100%;

height:50px;

border:none;

border-radius:10px;

background:#FF4B12;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#e5420d;

}

#error{

margin-top:15px;

color:#ff5a5a;

text-align:center;

font-size:14px;

display:none;

}

.loading{

opacity:.6;

pointer-events:none;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
 <div class="sb-logo-icon"><img width="56" height="56" src="https://i.postimg.cc/9FFzWPW4/IMG-20260607-032220-451.png" alt=""></div>
</div>

<h2>لوحة التحكم</h2>

<p>سجل الدخول لإدارة مستر ديليفري</p>

<div class="form-group">

<label>البريد الإلكتروني</label>

<input
type="email"
id="email"
placeholder="example@email.com">

</div>

<div class="form-group">

<label>كلمة المرور</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="********">

<span onclick="togglePassword()">👁</span>

</div>

</div>

<button id="loginBtn">

تسجيل الدخول

</button>

<div id="error"></div>

</div>

<script type="module">

import { auth } from "./api.js";
import {
    signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

// علشان الدالة تفضل شغالة مع onclick
window.togglePassword = togglePassword;

const loginBtn = document.getElementById("loginBtn");
const error = document.getElementById("error");

loginBtn.addEventListener("click", async () => {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    error.style.display = "none";

    if (!email || !password) {
        error.style.display = "block";
        error.innerText = "من فضلك أدخل البريد الإلكتروني وكلمة المرور";
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerText = "جارٍ تسجيل الدخول...";

    try {

        await signInWithEmailAndPassword(auth, email, password);

        localStorage.setItem("adminLogged", "true");

        window.location.href = "dashboard.html";

    } catch (e) {

        console.log(e);

        error.style.display = "block";
        error.innerText = "البريد الإلكتروني أو كلمة المرور غير صحيحة";

    } finally {

        loginBtn.disabled = false;
        loginBtn.innerText = "تسجيل الدخول";

    }

});

</script>

</body>
</html>
